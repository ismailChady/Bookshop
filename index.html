<!DOCTYPE html>
<html lang="en">
<a href="../shop.html">Back to Shop</a>
<head>
    <meta charset="UTF-8">
    <title>Opening Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Full-screen background video,kept it looping and muted so it plays automatically -->
    <video autoplay loop muted>
        <source src="bookshop.mp4" type="video/mp4">
    </video>

    <!-- Nav sits fixed top-right, icons + text links. -->
    <div id="Nav">
        <ul>
            <li><img src="contact-mail.png" alt="contact"> <a href="contact.html">Contact us</a>
            </li>
            <li><img src="info.png" alt="about"> <a href="about.html">About</a>
            </li>

        </ul>
    </div>

    <!-- Logo top-left, clicking it brings you back to the homepage -->
    <div id="Logo">
        <a href="index.html"><img src="book.png" alt="Books Logo"></a>
    </div>

    <!-- Shop Button Section, Centre of the page -->
    <div id="Shopbutton">
        <h1>Discover Our Newest Books</h1>
        <a href="shop.html">Shop</a>
    </div>
</body>
</html>
