<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<!-- Background colour set inline -->
<body style="background-color: #DDBE9F;">

    <div id="Logo">
        <a href="index.html"><img src="book.png" alt="Books Logo"></a>
    </div>

    <div id="Nav">
        <ul>
            <li><img src="contact-mail.png" alt="contact"> <a href="contact.html">Contact us</a></li>
            <li><img src="info.png" alt="about"> <a href="about.html">About</a></li>
        </ul>
    </div>

    <!-- Two-column layout: info on the left, form fields on the right -->
    <div id="contactpage">
        <div id="contactleft">
            <h1>Get in Touch</h1>
            <p>We'd like to hear from you!</p>
            <p>If you have any inquiries, please use the contact form!</p>
            <p>Email: bookshop@gmail.com</p>
            <p>Phone: +230 123 4567</p>
        </div>

        <!-- used input fields and a textarea for the contact form -->
        <div id="contactright">
            <input type="text" placeholder="First Name">
            <input type="text" placeholder="Last Name">
            <input type="text" placeholder="Email">
            <textarea placeholder="Message"></textarea>
            <a href="#">Send</a>
        </div>

    </div>

</body>
</html>
